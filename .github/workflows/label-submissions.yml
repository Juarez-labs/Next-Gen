name: Label submission PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Check changed files and label
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const touchesSubmissions = files.some(f => f.filename.startsWith('submissions/'));
            const onlySubmissions = files.length > 0 && files.every(f => f.filename.startsWith('submissions/'));

            const labels = [];
            if (touchesSubmissions) labels.push('submission');
            if (onlySubmissions) labels.push('intro-questionnaire');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels,
              });
            }
